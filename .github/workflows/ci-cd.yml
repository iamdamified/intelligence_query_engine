name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: intelligence_query_engine_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Check Python syntax
      run: |
        python -m py_compile main.py auth/router.py auth/tokens.py auth/rbac.py
      continue-on-error: true
    
    - name: Verify core modules
      run: |
        python -c "import main, auth, auth.router, auth.tokens, auth.rbac, auth.guards, auth.session, auth.oauth.github, auth.oauth.state, auth.oauth.pkce"
      continue-on-error: true
    
    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/intelligence_query_engine_test
      run: |
        alembic upgrade head
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build application
      run: |
        # Verify all imports
        python -c "
import sys
try:
    import main
    import auth
    import auth.router
    import auth.tokens
    import auth.rbac
    import auth.guards
    import auth.session
    import auth.oauth.github
    import auth.oauth.state
    import auth.oauth.pkce
    import database
    import crud
    import models
    import nlp_parser
    print('✓ All modules imported successfully')
except ImportError as e:
    print(f'✗ Import error: {e}')
    sys.exit(1)
        "
    
    - name: Verify FastAPI app initialization
      run: |
        python -c "
from main import app
print(f'✓ FastAPI app initialized: {app.title}')
print(f'✓ Routes: {len(app.routes)} routes registered')
        "

  deploy-check:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    
    - name: Verify vercel.json
      run: |
        if [ -f vercel.json ]; then
          echo "✓ vercel.json found"
          cat vercel.json
        else
          echo "✗ vercel.json not found"
          exit 1
        fi
    
    - name: Check deployment readiness
      run: |
        if [ -f requirements.txt ]; then
          echo "✓ requirements.txt found"
          echo "Dependencies count: $(wc -l < requirements.txt)"
        fi
        if [ -f alembic.ini ]; then
          echo "✓ alembic.ini found (database migrations configured)"
        fi
        if [ -f main.py ]; then
          echo "✓ main.py found"
        fi
        if [ -f auth/router.py ]; then
          echo "✓ auth/router.py found"
        fi
